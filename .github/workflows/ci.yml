name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # Билд валидирует окружение в next.config.ts. Значения фиктивные:
      # ни один запрос к Supabase на сборке не выполняется.
      NEXT_PUBLIC_SITE_URL: https://proyavka.example
      NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Format
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
